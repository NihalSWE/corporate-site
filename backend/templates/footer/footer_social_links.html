{% extends 'admin_panel/base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center mt-4">
        <div class="col-lg-8 pt-4">
            <div class="card">
                <div class="card-header pb-0 border-bottom-0">
                    <div class="d-flex justify-content-between align-items-center">
                        <h2>Footer Social Links</h2>
                        <a href="{% url 'footer_management' %}" class="btn btn-secondary btn-sm">
                            Back to Footer Management
                        </a>
                    </div>
                </div>
                <div class="card-body">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label" for="facebook_url">Facebook URL</label>
                            <input type="url" class="form-control" id="facebook_url" name="facebook_url"
                                   value="{{ social_settings.facebook_url|default:'' }}"
                                   placeholder="https://facebook.com/your-page">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="instagram_url">Instagram URL</label>
                            <input type="url" class="form-control" id="instagram_url" name="instagram_url"
                                   value="{{ social_settings.instagram_url|default:'' }}"
                                   placeholder="https://instagram.com/your-page">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="youtube_url">YouTube URL</label>
                            <input type="url" class="form-control" id="youtube_url" name="youtube_url"
                                   value="{{ social_settings.youtube_url|default:'' }}"
                                   placeholder="https://youtube.com/@your-channel">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="linkedin_url">LinkedIn URL</label>
                            <input type="url" class="form-control" id="linkedin_url" name="linkedin_url"
                                   value="{{ social_settings.linkedin_url|default:'' }}"
                                   placeholder="https://linkedin.com/company/your-page">
                        </div>

                        <div class="text-end">
                            <button type="submit" class="btn btn-primary">Save Social Links</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
